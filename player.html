<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banda TV - Player</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .player-container { padding: 20px; max-width: 800px; margin: auto; }
        iframe { width: 100%; height: 450px; border-radius: 10px; border: none; }
        .details { margin-top: 20px; text-align: left; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: red; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="player-container">
        <a href="index.html" class="back-btn">← Rudi Nyumbani</a>
        
        <div id="video-display">
            </div>

        <div id="movie-details" class="details">
            </div>
    </div>

    <script>
        // 1. Pata ID ya filamu kutoka kwenye URL (mfano: player.html?id=3)
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        // 2. Tafuta data ya hiyo filamu kwenye movie.json
        fetch('movie.json')
            .then(response => response.json())
            .then(data => {
                const movie = data.find(m => m.id == movieId);

                if (movie) {
                    // 3. Weka video ya YouTube/Server
                    document.getElementById('video-display').innerHTML = `
                        <iframe src="${movie.video_url}" allowfullscreen></iframe>
                    `;

                    // 4. Weka Maelezo
                    document.getElementById('movie-details').innerHTML = `
                        <h2>${movie.title}</h2>
                        <p><strong>Category:</strong> ${movie.category}</p>
                        <p>${movie.description}</p>
                        <hr>
                        <a href="${movie.buy_link}" class="play-btn" style="background: #25D366;">Nunua Filamu WhatsApp</a>
                    `;
                } else {
                    document.getElementById('video-display').innerHTML = "<h3>Filamu haijapatikana!</h3>";
                }
            });
    </script>
</body>
</html>
