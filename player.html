<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIZO PLAYER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player-container">
    <a href="index.html" style="color: white; text-decoration: none;">← Rudi Nyuma</a>
    <div class="video-wrapper" id="videoBox"></div>
    <div id="movieInfo" style="margin-top: 20px;"></div>
</div>

<script src="movies.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const movie = myMovies.find(m => m.id == id);

    if(movie) {
        document.getElementById('videoBox').innerHTML = `
            <video controls autoplay>
                <source src="${movie.video}" type="video/mp4">
            </video>
        `;
        document.getElementById('movieInfo').innerHTML = `
            <h1>${movie.title}</h1>
            <p>Kategoria: ${movie.category}</p>
        `;
    }
</script>
</body>
</html>
