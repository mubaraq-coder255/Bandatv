<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Banda TV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Karibu Banda TV</h1>
    <div id="movie-list" class="grid-container"></div>

    <script>
        // Hapa ndipo tunaita data kutoka kwenye movies.json
        fetch('movies.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('movie-list');
                data.forEach(movie => {
                    list.innerHTML += `
                        <div class="movie-card">
                            <img src="${movie.image}" alt="${movie.title}">
                            <h3>${movie.title}</h3>
                            <p>${movie.description}</p>
                            <a href="${movie.video_url}" target="_blank">Tazama Filamu</a>
                        </div>
                    `;
                });
            })
            .catch(error => console.log('Kuna hitilafu:', error));
    </script>
</body>
</html>
