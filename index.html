            <div class="search-box">

    <main>

    </footer>

        // Kumbuka kuweka ile list yako ya JSON hapa ndani ya mabano haya []

        const movieGrid = document.getElementById('movieGrid');

        function displayMovies(data) {
            movieGrid.innerHTML = data.map(movie => `
                <div class="movie-card">
                    <div class="card-img">
                        <img src="${movie.image}" alt="${movie.title}">
                        <span class="category-tag">${movie.category}</span>
                    </div>
                    <div class="card-info">
                        <h3>${movie.title}</h3>
                        <p>${movie.status}</p>
                        <div class="card-buttons">
                            <a href="player.html?id=${movie.id}" class="btn-watch">Tazama</a>
                            <a href="${movie.buy_link}" class="btn-buy"><i class="fab fa-whatsapp"></i> Nunua</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
