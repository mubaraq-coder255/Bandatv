<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIZO MOVIES ONLINE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">FIZO<span>MOVIES</span></div>
    <nav>
        <ul>
            <li><a href="#" class="cat-btn active" data-cat="All">Home</a></li>
            <li><a href="#" class="cat-btn" data-cat="Action">Action</a></li>
            <li><a href="#" class="cat-btn" data-cat="Animation">Animation</a></li>
        </ul>
    </nav>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tafuta movie...">
        <i class="fas fa-search"></i>
    </div>
</header>

<section class="movie-section">
    <h2 id="sectionTitle">Zilizowekwa Hivi Karibuni</h2>
    <div id="movieGrid"></div>
</section>

<script src="movies.js"></script>

<script>
const movieGrid = document.getElementById('movieGrid');

function displayMovies(data) {
    movieGrid.innerHTML = data.map(movie => `
        <div class="movie-card">
            <img src="${movie.image}" alt="${movie.title}">
            <div class="card-info">
                <h3>${movie.title}</h3>
                <div class="card-buttons">
                    <a href="player.html?id=${movie.id}" class="btn-watch">Tazama</a>
                    <a href="${movie.buy_link}" class="btn-buy">Nunua</a>
                </div>
            </div>
        </div>
    `).join('');
}

// Chagua kulingana na Kategoria
document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        const cat = btn.getAttribute('data-cat');
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const filtered = cat === "All" ? myMovies : myMovies.filter(m => m.category === cat);
        displayMovies(filtered);
    });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = myMovies.filter(m => m.title.toLowerCase().includes(term));
    displayMovies(filtered);
});

displayMovies(myMovies);
</script>
</body>
</html>
