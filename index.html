<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banda TV - Filamu Kali</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Karibu Banda TV</h1>
    </header>

    <div id="movie-list" class="grid-container"></div>

    <script>
        // Tunaita faili lako la movies.json
        fetch('movies.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('movie-list');
                let html = ''; 

                data.forEach(movie => {
                    // HAPA NDIPO KIPENGELE MUHIMU: Tunatumia BACKTICKS (alama iliyo chini ya ESC)
                    html += `
                        <div class="movie-card">
                            <img src="${movie.image}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=Picha+Haipo'">
                            <h3>${movie.title}</h3>
                            <p class="status">${movie.status}</p>
                            <a href="player.html?id=${movie.id}" class="play-btn">Tazama Filamu</a>
                        </div>
                    `;
                });
                list.innerHTML = html;
            })
            .catch(error => {
                console.error('Hitilafu:', error);
                document.getElementById('movie-list').innerHTML = '<p>Filamu zinapakia... Hakikisha movies.json haina makosa.</p>';
            });
    </script>
</body>
</html>
